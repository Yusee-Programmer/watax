name: watax Build & Benchmark

on:
  push:
  pull_request:

jobs:
  # ===================================================================
  # Build: compile watax with the LATEST published tauraroc release on
  # every platform, to prove the framework builds against the current
  # compiler. Uploads a SOURCE bundle (no binaries) as the artifact.
  # ===================================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
          - os: ubuntu-22.04-arm
            platform: linux-arm64
            ext: ""
          - os: windows-latest
            platform: windows-x64
            ext: ".exe"
          - os: macos-latest
            platform: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout watax
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Download the latest tauraroc release for this platform. The zip
      # contains tauraroc[.exe] + runtime/ + std/; the binary self-locates
      # those relative to itself, so we keep the extracted tree intact.
      # ---------------------------------------------------------------
      - name: Download latest tauraroc
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP="tauraroc-${{ matrix.platform }}.zip"
          TAG=$(gh release view --repo Yusee-Programmer/tauraro \
                  --json tagName -q '.tagName' 2>/dev/null || true)
          if [ -z "$TAG" ]; then echo "error: no tauraroc release found"; exit 1; fi
          echo "Latest tauraroc: $TAG"
          mkdir -p tauraroc-install/
          gh release download "$TAG" --repo Yusee-Programmer/tauraro \
            --pattern "$ZIP" --dir tauraroc-dl/ --clobber
          if ! unzip -oq "tauraroc-dl/$ZIP" -d tauraroc-install/ 2>/dev/null; then
            powershell -Command "Expand-Archive -Force -Path 'tauraroc-dl/$ZIP' -DestinationPath 'tauraroc-install/'"
          fi
          BIN=$(find tauraroc-install -name "tauraroc${{ matrix.ext }}" ! -path "*/src/*" | head -1)
          [ -z "$BIN" ] && { echo "error: tauraroc not found in $ZIP"; exit 1; }
          chmod +x "$BIN" 2>/dev/null || true
          if [ "$RUNNER_OS" = "Windows" ]; then BIN=$(cygpath -w "$BIN"); fi
          echo "TAURAROC=$BIN" >> "$GITHUB_ENV"
          echo "Using tauraroc: $BIN"

      # ---------------------------------------------------------------
      # watax depends on templa (a local-path dep in taupkg.toml). Clone
      # it into .taupkg/packages/templa so `from templa import ...`
      # resolves during the build. (templa ships no binaries we need.)
      # ---------------------------------------------------------------
      - name: Fetch templa dependency
        shell: bash
        run: |
          mkdir -p .taupkg/packages
          git clone --depth 1 https://github.com/Yusee-Programmer/templa.git .taupkg/packages/templa
          echo "templa: $(ls .taupkg/packages/templa)"

      - name: Build watax (verify it compiles)
        shell: bash
        run: |
          export TAURARO_PATH="$(pwd)/.taupkg/packages:$(pwd)/src"
          "$TAURAROC" src/main.tr -o "watax${{ matrix.ext }}"
          if [ ! -f "watax${{ matrix.ext }}" ]; then echo "error: watax did not build"; exit 1; fi
          echo "==> Built watax${{ matrix.ext }}: $(ls -lh watax${{ matrix.ext }})"

      # ---------------------------------------------------------------
      # Source bundle artifact: exactly the source a consumer needs to
      # use/extend watax — no binaries, build output, or vendored deps.
      # ---------------------------------------------------------------
      - name: Upload watax source artifact
        uses: actions/upload-artifact@v4
        with:
          name: watax-src-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src/
            docs/
            example/
            benchmarks/
            public/
            assets/
            taupkg.toml
            taupkg.lock
            README.md
            .gitignore
            !**/*.exe
            !**/*.c
            !**/build/**
            !benchmarks/axum_app/target/**

  # ===================================================================
  # Benchmark: watax vs axum (Rust) vs FastAPI (Python). Runs on Linux
  # after a successful build, then COMMITS benchmarks/results.md back to
  # the repo (not uploaded as an artifact — it lives as a tracked .md).
  # Only on pushes to master; the commit carries [skip ci].
  # ===================================================================
  benchmark:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout watax
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download latest tauraroc (linux-x64)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo Yusee-Programmer/tauraro --json tagName -q '.tagName')
          gh release download "$TAG" --repo Yusee-Programmer/tauraro \
            --pattern "tauraroc-linux-x64.zip" --dir dl/ --clobber
          mkdir -p tauraroc-install && unzip -oq "dl/tauraroc-linux-x64.zip" -d tauraroc-install/
          BIN=$(find tauraroc-install -name tauraroc ! -path "*/src/*" | head -1)
          chmod +x "$BIN"
          echo "TAURAROC=$(pwd)/$BIN" >> "$GITHUB_ENV"

      - name: Fetch templa dependency
        run: |
          mkdir -p .taupkg/packages
          git clone --depth 1 https://github.com/Yusee-Programmer/templa.git .taupkg/packages/templa

      - name: Install benchmark toolchains (Rust, FastAPI)
        run: |
          rustup show >/dev/null 2>&1 || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet fastapi "uvicorn[standard]"

      - name: Run benchmarks (watax vs axum vs FastAPI)
        env:
          BENCH_CONC: "50"
          BENCH_DUR: "8"
        run: |
          bash benchmarks/run_all.sh || true
          echo "===== benchmarks/results.md ====="
          cat benchmarks/results.md || echo "no results.md produced"

      - name: Commit results.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/results.md
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
          else
            git commit -m "ci: update watax benchmark results [skip ci]"
            git push
          fi
