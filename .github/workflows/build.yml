name: watax Build & Benchmark

on:
  push:
  pull_request:

# The toolchain bootstrap is identical for both jobs:
#   1. Download the published taupkg binary for this platform.
#   2. `taupkg install-tauraro` -> installs the LATEST tauraroc into
#      ~/.taupkg/bin/tauraroc-<platform>/ (binary + runtime/ + std/).
#   3. `taupkg install` -> clones the templa dependency (github source in
#      taupkg.toml) into .taupkg/packages/.
# A composite step can't be shared across jobs in one file, so each job repeats
# the bootstrap inline.

jobs:
  # ===================================================================
  # Build: compile watax with the LATEST tauraroc on every platform, to
  # prove the framework builds. Uploads a SOURCE bundle (no binaries).
  # ===================================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    platform: linux-x64,   ext: "" }
          - { os: ubuntu-22.04-arm, platform: linux-arm64, ext: "" }
          - { os: windows-latest,   platform: windows-x64, ext: ".exe" }
          - { os: macos-latest,     platform: macos-arm64, ext: "" }

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout watax
        uses: actions/checkout@v4

      - name: Bootstrap tauraroc + deps via taupkg
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PLATFORM="${{ matrix.platform }}"; EXT="${{ matrix.ext }}"

          # 1. Download the taupkg binary for this platform.
          gh release download --repo tauraro/taupkg \
            --pattern "taupkg-${PLATFORM}.zip" --dir taupkg-dl --clobber
          mkdir -p taupkg-bin
          if ! unzip -oq "taupkg-dl/taupkg-${PLATFORM}.zip" -d taupkg-bin 2>/dev/null; then
            powershell -Command "Expand-Archive -Force -Path 'taupkg-dl/taupkg-${PLATFORM}.zip' -DestinationPath 'taupkg-bin'"
          fi
          TAUPKG=$(find taupkg-bin -name "taupkg${EXT}" -type f | head -1)
          chmod +x "$TAUPKG" 2>/dev/null || true
          echo "taupkg: $TAUPKG"

          # 2. Install the latest tauraroc (downloads from tauraro/tauraro).
          "$TAUPKG" install-tauraro --verbose

          # 3. Locate the freshly installed tauraroc and export its path so the
          #    build step (and any later step) uses it without PATH juggling.
          TAURAROC=$(find "$HOME/.taupkg/bin" "${USERPROFILE:-/nonexistent}/.taupkg/bin" \
                       -name "tauraroc${EXT}" -type f 2>/dev/null | head -1)
          [ -z "$TAURAROC" ] && { echo "error: tauraroc not found after install-tauraro"; exit 1; }
          echo "tauraroc: $TAURAROC ($("$TAURAROC" --version 2>/dev/null || echo '?'))"
          echo "TAURAROC=$TAURAROC" >> "$GITHUB_ENV"

          # 4. Fetch dependencies (templa, from the github source in taupkg.toml).
          "$TAUPKG" install || true
          # Fallback: guarantee templa is present even if `taupkg install` hit a
          # snag (it shells out to git clone). CI paths have no spaces, so this
          # is robust.
          if [ ! -d .taupkg/packages/templa ]; then
            echo "==> cloning templa directly"
            mkdir -p .taupkg/packages
            git clone --depth 1 https://github.com/Yusee-Programmer/templa.git .taupkg/packages/templa
          fi
          ls .taupkg/packages

      - name: Build watax (verify it compiles)
        shell: bash
        run: |
          export TAURARO_PATH="$(pwd)/.taupkg/packages:$(pwd)/src"
          "$TAURAROC" src/main.tr -o "watax${{ matrix.ext }}"
          [ -f "watax${{ matrix.ext }}" ] || { echo "error: watax did not build"; exit 1; }
          echo "==> Built watax${{ matrix.ext }}: $(ls -lh watax${{ matrix.ext }})"

      - name: Upload watax source artifact
        uses: actions/upload-artifact@v4
        with:
          name: watax-src-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src/
            docs/
            example/
            benchmarks/
            public/
            assets/
            taupkg.toml
            README.md
            .gitignore
            !**/*.exe
            !**/*.c
            !**/build/**
            !benchmarks/axum_app/target/**

  # ===================================================================
  # Benchmark: watax vs axum (Rust) vs FastAPI (Python) on Linux, then
  # COMMIT benchmarks/results.md back to the repo (master push only).
  # ===================================================================
  benchmark:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout watax
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap tauraroc + deps via taupkg
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release download --repo tauraro/taupkg \
            --pattern "taupkg-linux-x64.zip" --dir taupkg-dl --clobber
          mkdir -p taupkg-bin && unzip -oq "taupkg-dl/taupkg-linux-x64.zip" -d taupkg-bin
          TAUPKG=$(find taupkg-bin -name "taupkg" -type f | head -1); chmod +x "$TAUPKG"
          "$TAUPKG" install-tauraro --verbose
          TAURAROC=$(find "$HOME/.taupkg/bin" -name "tauraroc" -type f | head -1)
          echo "TAURAROC=$TAURAROC" >> "$GITHUB_ENV"
          "$TAUPKG" install || true
          if [ ! -d .taupkg/packages/templa ]; then
            mkdir -p .taupkg/packages
            git clone --depth 1 https://github.com/Yusee-Programmer/templa.git .taupkg/packages/templa
          fi

      - name: Install benchmark toolchains (Rust, FastAPI)
        run: |
          rustup show >/dev/null 2>&1 || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet fastapi "uvicorn[standard]"

      - name: Run benchmarks (watax vs axum vs FastAPI)
        env:
          BENCH_CONC: "50"
          BENCH_DUR: "8"
        run: |
          bash benchmarks/run_all.sh || true
          echo "===== benchmarks/results.md ====="
          cat benchmarks/results.md || echo "no results.md produced"

      - name: Commit results.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/results.md
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
          else
            git commit -m "ci: update watax benchmark results [skip ci]"
            git push
          fi
