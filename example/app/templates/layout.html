<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}watax notes{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a class="brand" href="/">watax notes</a>
            <nav>
                <a href="/">Notes</a>
                <a href="/about">About</a>
                <a href="/api/notes">API</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Reference app for the watax web framework, running on Tauraro.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
